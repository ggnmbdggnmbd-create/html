DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BTC 15m 逻辑同步版</title>
    <style>
        :root { --green: #3fb950; --red: #f85149; --gold: #f2c94c; --bg: #090c10; --card: #161b22; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { background: var(--bg); color: #c9d1d9; font-family: -apple-system, sans-serif; padding: 10px 12px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        body.landscape-mode { position: fixed; top: 0; left: 0; width: 100vh !important; height: 100vw !important; transform: rotate(90deg); transform-origin: top left; left: 100vw; padding: 0; z-index: 9999; background: #000; }
        body.landscape-mode .header, body.landscape-mode .strategy-panel, body.landscape-mode .calc-panel, body.landscape-mode .controls { display: none !important; }
        body.landscape-mode #chartCanvas { width: 100vh !important; height: 100vw !important; max-height: none !important; border: none; }
        .land-back-btn { display: none; position: absolute; bottom: 20px; right: 20px; z-index: 10001; background: rgba(255,255,255,0.2); color: #fff; padding: 12px 24px; border-radius: 30px; backdrop-filter: blur(5px); border: 1px solid #fff; }
        body.landscape-mode .land-back-btn { display: block; }
        #chartCanvas { width: 100%; flex: 1; max-height: 50vh; background: #010409; border: 1px solid #30363d; border-radius: 12px; touch-action: none; outline: none; }
        #alertOverlay { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: rgba(176, 26, 26, 0.95); border: 2px solid var(--gold); border-radius: 20px; padding: 15px 30px; color: #fff; font-weight: bold; z-index: 10000; display: none; text-align: center; }
        .alarm-active { animation: ring-glow 0.8s infinite; }
        @keyframes ring-glow { 50% { box-shadow: 0 0 25px var(--gold); } }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; }
        .price { font-size: 28px; font-weight: 800; color: var(--green); font-family: monospace; }
        .strategy-panel { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 10px; padding: 8px; position: relative; }
        .label { font-size: 10px; font-weight: bold; margin-bottom: 3px; display: block; opacity: 0.8; }
        .val { font-size: 11px; font-family: monospace; color: #f0f6fc; }
        .controls { margin-top: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .btn { padding: 12px 2px; border: none; border-radius: 8px; font-weight: bold; font-size: 11px; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
        .btn-active { background: #007aff !important; color: #fff !important; }
        .calc-panel { margin-top: 10px; background: var(--card); border: 1px solid #30363d; border-radius: 10px; padding: 10px; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .calc-panel input { background: #0d1117; border: 1px solid #30363d; color: #fff; padding: 8px; border-radius: 6px; font-size: 13px; width: 100%; outline: none; }
        .keep-alive-btn { grid-column: span 4; background: #1c2128; color: var(--gold); border: 1px dashed var(--gold); padding: 8px; font-size: 10px; border-radius: 8px; margin-top: 5px; }
    </style>
</head>
<body>
    <button class="land-back-btn" onclick="toggleLandscape()">退出横屏</button>
    <div id="alertOverlay" onclick="stopAlarm()">信号提示 (点击关闭停止响铃)</div>
    <div class="header">
        <div><div id="curPrice" class="price">--.--</div><div style="font-size:10px; color:var(--gold)">BTC-15m 逻辑同步版</div></div>
        <div id="countdown" style="font-size:10px; color:#8b949e">载入中...</div>
    </div>
    <canvas id="chartCanvas"></canvas>
    <div class="strategy-panel">
        <div class="card"><span class="label" style="color:var(--green)">看涨 OB</span><div class="val">价: <span id="lE">--</span></div><div class="val">损: <span id="lS">--</span></div><div id="lLev" style="position:absolute; right:8px; bottom:8px; font-size:16px; font-weight:900; color:var(--gold)">--x</div></div>
        <div class="card"><span class="label" style="color:var(--red)">看跌 OB</span><div class="val">价: <span id="sS">--</span></div><div class="val">损: <span id="sE">--</span></div><div id="sLev" style="position:absolute; right:8px; bottom:8px; font-size:16px; font-weight:900; color:var(--gold)">--x</div></div>
    </div>
    <div class="controls">
        <button class="btn" style="background:var(--gold);color:#000" onclick="toggleLandscape()">横屏看盘</button>
        <button id="editBtn" class="btn" onclick="toggleEdit()">调趋势线</button>
        <button id="alertBtn" class="btn" style="background:#238636;color:#fff" onclick="toggleAlert()">守护中</button>
        <button class="btn" onclick="resetOB()">重置OB</button>
        <button class="keep-alive-btn" onclick="document.getElementById('musicFile').click()">🎵 必须选个本地MP3 (确保后台响铃)</button>
        <input type="file" id="musicFile" accept=".mp3" style="display:none;" onchange="loadLocalMusic(this)">
    </div>
    <div class="calc-panel">
        <div class="calc-grid"><input type="number" id="calcE" placeholder="入场价"><input type="number" id="calcS" placeholder="止损价"><input type="number" id="calcL" placeholder="预亏金额"><input type="number" id="calcM" placeholder="保证金"></div>
        <div style="margin-top:8px; display:flex; justify-content:space-between; align-items:center"><span id="audioStatus" style="font-size:9px; color:var(--red)">状态: 音频未激活</span><span id="calcResVal" style="font-size:18px; color:var(--gold); font-weight:900;">-- x</span></div>
    </div>
<script>
    let rawData = [], isMonitoring = true, isEditMode = false, isLandscape = false;
    let alertSound = new Audio(); alertSound.loop = true;
    const canvas = document.getElementById('chartCanvas'), ctx = canvas.getContext('2d'), dpr = window.devicePixelRatio || 1;
    let viewOffset = -25, visibleBars = 60, lastX = 0, lastDist = 0, lastAlertMsg = "", lastAlertBarIdx = -999;
    let hasLeftOB = { bull: true, bear: true };
    const trendline = JSON.parse(localStorage.getItem('btc_trendline') || '{"p1_idx":450,"p1_val":65000,"p2_idx":480,"p2_val":66000,"active":null}');
    let persistentOB = JSON.parse(localStorage.getItem('btc_persistent_ob') || '{"bull":{"h":0,"l":0},"bear":{"h":0,"l":0}}');

    function loadLocalMusic(input) {
        if (input.files[0]) {
            alertSound.src = URL.createObjectURL(input.files[0]);
            alertSound.load();
            document.getElementById('audioStatus').innerText = "状态: 后台音频已就绪";
            document.getElementById('audioStatus').style.color = "var(--green)";
            alertSound.muted = true; alertSound.play().then(() => { alertSound.pause(); alertSound.muted = false; });
        }
    }
    function toggleAlert() {
        isMonitoring = !isMonitoring;
        if(isMonitoring) { alertSound.muted = true; alertSound.play().then(() => { alertSound.pause(); alertSound.currentTime = 0; alertSound.muted = false; }); }
        document.getElementById('alertBtn').innerText = isMonitoring ? "守护中" : "监控暂停";
        document.getElementById('alertBtn').style.background = isMonitoring ? "#238636" : "#444";
    }
    async function fetchData() {
        try {
            const res = await fetch(`https://www.okx.com/api/v5/market/candles?instId=BTC-USDT-SWAP&bar=15m&limit=500`);
            const j = await res.json();
            if(j.data) {
                rawData = j.data.map(d=>({t:+d[0],o:+d[1],h:+d[2],l:+d[3],c:+d[4]}));
                if(rawData.length > 0) { document.getElementById('curPrice').innerText = rawData[0].c.toFixed(1); processLogic(); }
                requestAnimationFrame(draw);
            }
        } catch(e){}
    }
    function processLogic() {
        if (!rawData.length) return;
        const data = [...rawData].reverse(), lastBar = data[data.length-1], w = canvas.width/dpr, h = canvas.height/dpr;
        const rP = isLandscape?85:35, vP = isLandscape?h*0.22:h*0.15, endIdx = data.length-1-Math.floor(viewOffset), startIdx = Math.max(-100, endIdx-Math.round(visibleBars));
        const vData = data.slice(Math.max(0, startIdx), Math.min(data.length, endIdx+1));
        const hi = Math.max(...vData.map(d=>d.h)), lo = Math.min(...vData.map(d=>d.l)), range = (hi-lo)||1;
        const getY = (v) => h-vP-((v-lo)/range)*(h-vP*2), getX = (idx) => 15+(idx-startIdx)*((w-15-rP)/(endIdx-startIdx));
        const x1 = getX(trendline.p1_idx), y1 = getY(trendline.p1_val), x2 = getX(trendline.p2_idx), y2 = getY(trendline.p2_val);
        const slope = (y2-y1)/(x2-x1||1), intercept = y1-slope*x1;
        const searchStart = Math.min(trendline.p1_idx, trendline.p2_idx), searchEnd = Math.max(trendline.p1_idx, trendline.p2_idx);
        let maxH = -Infinity, hiIdx = -1, minL = Infinity, loIdx = -1;
        for(let i=searchStart; i<=searchEnd; i++) { if(!data[i]) continue; if(data[i].h>maxH){maxH=data[i].h; hiIdx=i;} if(data[i].l<minL){minL=data[i].l; loIdx=i;} }
        if (slope > 0) {
            if (getY(lastBar.c) < (slope*getX(data.length-1)+intercept)) {
                persistentOB.bear = {h:data[hiIdx].h, l:data[hiIdx].l};
                let pL=Infinity, pLi=-1; for(let j=Math.max(0,hiIdx-20);j<hiIdx;j++){if(data[j].l<pL){pL=data[j].l; pLi=j;}}
                if(pLi!==-1) persistentOB.bull = {h:data[pLi].h, l:data[pLi].l};
            }
        } else {
            if (getY(lastBar.c) > (slope*getX(data.length-1)+intercept)) {
                persistentOB.bull = {h:data[loIdx].h, l:data[loIdx].l};
                let pH=-Infinity, pHi=-1; for(let j=Math.max(0,loIdx-20);j<loIdx;j++){if(data[j].h>pH){pH=data[j].h; pHi=j;}}
                if(pHi!==-1) persistentOB.bear = {h:data[pHi].h, l:data[pHi].l};
            }
        }
        document.getElementById('lE').innerText=persistentOB.bull.h.toFixed(0); document.getElementById('lS').innerText=persistentOB.bull.l.toFixed(0);
        document.getElementById('sS').innerText=persistentOB.bear.h.toFixed(0); document.getElementById('sE').innerText=persistentOB.bear.l.toFixed(0);
        checkSignals(lastBar, slope, intercept, getY, getX, data.length-1);
    }
    function checkSignals(last, slope, intercept, getY, getX, currentIdx) {
        if (!isMonitoring) return;
        const overlay = document.getElementById('alertOverlay');
        const r = 900 - (Math.floor(Date.now()/1000)%900);
        document.getElementById('countdown').innerText = `收线 ${Math.floor(r/60)}:${(r%60).toString().padStart(2,'0')}`;
        let msg = ""; let lineY = slope*getX(currentIdx)+intercept;
        if(slope>0 && getY(last.c)>lineY) msg="⚠️ 跌破趋势线"; if(slope<0 && getY(last.c)<lineY) msg="⚠️ 涨破趋势线";
        const checkOB = (ob, type) => {
            if(!ob || ob.h<=0) return;
            if(last.c<=ob.h && last.c>=ob.l) {
                if(hasLeftOB[type]) { msg=`💎 二次试探: ${type=='bull'?'涨':'跌'}OB`; hasLeftOB[type]=false; }
                else if(!msg) msg=`🔔 触碰 ${type=='bull'?'涨':'跌'}OB`;
            } else { hasLeftOB[type]=true; }
        };
        if(!msg) { checkOB(persistentOB.bull,'bull'); checkOB(persistentOB.bear,'bear'); }
        if(msg && (msg!==lastAlertMsg || currentIdx>lastAlertBarIdx)) {
            overlay.innerText = msg; overlay.style.display="block"; overlay.classList.add('alarm-active');
            if(alertSound.src) { alertSound.pause(); alertSound.currentTime=0; alertSound.play().catch(()=>{}); }
            lastAlertMsg=msg; lastAlertBarIdx=currentIdx;
        }
        updateAllLevs(); localStorage.setItem('btc_persistent_ob', JSON.stringify(persistentOB));
    }
    function draw() {
        if (!rawData.length) return;
        const w=canvas.width/dpr, h=canvas.height/dpr, data=[...rawData].reverse(); ctx.clearRect(0,0,w,h);
        const rP=isLandscape?85:35, vP=isLandscape?h*0.22:h*0.15, endIdx=data.length-1-Math.floor(viewOffset), startIdx=Math.max(-100,endIdx-Math.round(visibleBars));
        const vData=data.slice(Math.max(0,startIdx), Math.min(data.length,endIdx+1));
        const hi=Math.max(...vData.map(d=>d.h)), lo=Math.min(...vData.map(d=>d.l)), range=(hi-lo)||1;
        const getY=(v)=>h-vP-((v-lo)/range)*(h-vP*2), getX=(i)=>15+(i-startIdx)*((w-15-rP)/(endIdx-startIdx));
        const x1=getX(trendline.p1_idx), y1=getY(trendline.p1_val), x2=getX(trendline.p2_idx), y2=getY(trendline.p2_val);
        const slope=(y2-y1)/(x2-x1||1), intercept=y1-slope*x1;
        ctx.strokeStyle="rgba(242,201,76,0.5)"; ctx.setLineDash([5,5]); ctx.beginPath(); ctx.moveTo(0,intercept); ctx.lineTo(w,slope*w+intercept); ctx.stroke(); ctx.setLineDash([]);
        if(isEditMode) { ctx.fillStyle="#007aff"; ctx.beginPath(); ctx.arc(x1,y1,15,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(x2,y2,15,0,Math.PI*2); ctx.fill(); }
        if(persistentOB.bull.h>0){ctx.fillStyle="rgba(63,185,80,0.1)"; ctx.fillRect(0,getY(persistentOB.bull.h),w,Math.abs(getY(persistentOB.bull.l)-getY(persistentOB.bull.h)));}
        if(persistentOB.bear.h>0){ctx.fillStyle="rgba(248,81,73,0.1)"; ctx.fillRect(0,getY(persistentOB.bear.h),w,Math.abs(getY(persistentOB.bear.l)-getY(persistentOB.bear.h)));}
        data.forEach((d,i)=>{if(i<startIdx||i>endIdx)return; const x=getX(i), c=d.c>=d.o?"#3fb950":"#f85149"; ctx.strokeStyle=c; ctx.beginPath(); ctx.moveTo(x,getY(d.h)); ctx.lineTo(x,getY(d.l)); ctx.stroke(); const bw=Math.max(2,((w-15-rP)/visibleBars)*0.7); ctx.fillStyle=c; ctx.fillRect(x-bw/2,getY(Math.max(d.o,d.c)),bw,Math.max(0.5,Math.abs(getY(d.o)-getY(d.c))));});
    }
    function getTouchPos(e) { const r=canvas.getBoundingClientRect(), t=e.touches[0]; return isLandscape?{x:t.clientY-r.top, y:r.width-(t.clientX-r.left)} : {x:t.clientX-r.left, y:t.clientY-r.top}; }
    canvas.addEventListener('touchstart', e=>{ const p=getTouchPos(e); if(e.touches.length===1){ if(isEditMode){ const d=[...rawData].reverse(), endIdx=d.length-1-Math.floor(viewOffset), startIdx=Math.max(-100,endIdx-Math.round(visibleBars)); const vData=d.slice(Math.max(0,startIdx),Math.min(d.length,endIdx+1)); const hi=Math.max(...vData.map(k=>k.h)), lo=Math.min(...vData.map(k=>k.l)), w=canvas.width/dpr, h=canvas.height/dpr, rP=isLandscape?85:35, vP=isLandscape?h*0.22:h*0.15; const gY=(v)=>h-vP-((v-lo)/((hi-lo)||1))*(h-vP*2), gX=(i)=>15+(i-startIdx)*((w-15-rP)/(endIdx-startIdx)); if(Math.hypot(p.x-gX(trendline.p1_idx),p.y-gY(trendline.p1_val))<50) trendline.active='p1'; else if(Math.hypot(p.x-gX(trendline.p2_idx),p.y-gY(trendline.p2_val))<50) trendline.active='p2'; else {lastX=p.x; trendline.active=null;} }else{lastX=p.x;} }else if(e.touches.length===2){lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);} });
    canvas.addEventListener('touchmove', e=>{ e.preventDefault(); const p=getTouchPos(e); if(e.touches.length===1){ if(!trendline.active){viewOffset=Math.max(-visibleBars, Math.min(rawData.length, viewOffset-(p.x-lastX)/(canvas.width/dpr/visibleBars))); lastX=p.x;} else { const d=[...rawData].reverse(), endIdx=d.length-1-Math.floor(viewOffset), startIdx=Math.max(-100,endIdx-Math.round(visibleBars)), vData=d.slice(Math.max(0,startIdx),Math.min(d.length,endIdx+1)), hi=Math.max(...vData.map(k=>k.h)), lo=Math.min(...vData.map(k=>k.l)), w=canvas.width/dpr, h=canvas.height/dpr, rP=isLandscape?85:35, vP=isLandscape?h*0.22:h*0.15; trendline[trendline.active+'_idx']=Math.round(startIdx+(p.x-15)/((w-15-rP)/(endIdx-startIdx))); trendline[trendline.active+'_val']=lo+(h-vP-p.y)/(h-vP*2)*(hi-lo); } } else if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); if(lastDist>0){visibleBars=Math.max(10,Math.min(250,visibleBars*(lastDist/d))); lastDist=d;}} requestAnimationFrame(draw); }, {passive:false});
    canvas.addEventListener('touchend', ()=>{trendline.active=null; localStorage.setItem('btc_trendline', JSON.stringify(trendline));});
    function stopAlarm() { alertSound.pause(); alertSound.currentTime=0; document.getElementById('alertOverlay').style.display="none"; document.getElementById('alertOverlay').classList.remove('alarm-active'); }
    function toggleLandscape() { isLandscape=!isLandscape; document.body.classList.toggle('landscape-mode', isLandscape); setTimeout(() => { canvas.width=canvas.clientWidth*dpr; canvas.height=canvas.clientHeight*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); fetchData(); }, 300); }
    function toggleEdit() { isEditMode=!isEditMode; document.getElementById('editBtn').classList.toggle('btn-active', isEditMode); }
    function resetOB() { persistentOB={"bull":{"h":0,"l":0},"bear":{"h":0,"l":0}}; fetchData(); }
    function updateAllLevs() { 
        const loss=parseFloat(document.getElementById('calcL').value), margin=parseFloat(document.getElementById('calcM').value);
        const calc=(e,s)=>(!e||!s||!loss||!margin||Math.abs(e-s)<1)?"--":((loss*e)/(Math.abs(e-s)*margin)).toFixed(1);
        document.getElementById('calcResVal').innerText=calc(parseFloat(document.getElementById('calcE').value), parseFloat(document.getElementById('calcS').value))+" x";
        document.getElementById('lLev').innerText=calc(parseFloat(document.getElementById('lE').innerText), parseFloat(document.getElementById('lS').innerText))+"x";
        document.getElementById('sLev').innerText=calc(parseFloat(document.getElementById('sE').innerText), parseFloat(document.getElementById('sS').innerText))+"x";
    }
    function init() { canvas.width=canvas.clientWidth*dpr; canvas.height=canvas.clientHeight*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); fetchData(); }
    window.onload=init; setInterval(fetchData, 1500);
</script>
</body>
</html>
